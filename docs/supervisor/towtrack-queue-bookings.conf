[program:towtrack-queue-bookings]
command=php /var/www/towtrack/artisan queue:work redis --queue=bookings --tries=10 --backoff=60
process_name=%(program_name)s_%(process_num)02d
numprocs=2
directory=/var/www/towtrack
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stopwaitsecs=3600
stdout_logfile=/var/log/towtrack-queue-bookings.log
