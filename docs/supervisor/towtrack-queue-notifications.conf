[program:towtrack-queue-notifications]
command=php /var/www/towtrack/artisan queue:work redis --queue=notifications --tries=5
process_name=%(program_name)s_%(process_num)02d
numprocs=3
directory=/var/www/towtrack
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stopwaitsecs=3600
stdout_logfile=/var/log/towtrack-queue-notifications.log
